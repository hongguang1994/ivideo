services:
  # OpenList：挂载各类网盘，提供文件列表与直链。
  # 首次启动后到 http://<服务器IP>:5244 用 admin 登录并配置网盘。
  # 初始管理员密码见容器日志：docker compose logs openlist | grep -i password
  openlist:
    image: openlistteam/openlist:latest
    container_name: ivideo-openlist
    restart: unless-stopped
    # OpenList v4.1.0+ 会校验数据目录可写；数据卷为 root 所有，
    # 故以 root 运行避免权限报错（官方文档推荐做法）。
    user: "0:0"
    ports:
      - "5244:5244"
    volumes:
      - ./data/openlist:/opt/openlist/data
      # 与 ivideo-jellyfin 共用同一宿主目录：Strm 驱动 SaveStrmToLocal
      # 写到 /media/strm，Jellyfin 即可扫到（两边都映射 ./data/media）。
      - ./data/media:/media
    environment:
      - TZ=Asia/Shanghai
      - UMASK=022
      # 如需以特定用户运行，取消注释并填入宿主机的 UID:GID
      # - PUID=0
      # - PGID=0

  # Jellyfin：独立媒体服务器，负责刮削元数据、海报、转码。
  # 媒体库指向 ./data/media（strm 生成器把网盘内容转成 .strm 放这里）。
  # 首启后到 http://<服务器IP>:8096 走向导建库，并在后台生成 API Key 填进 .env。
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: ivideo-jellyfin
    restart: unless-stopped
    ports:
      # 宿主 8096 已被现有 Jellyfin 占用，改用 8097
      - "8097:8096"
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ./data/media:/media
    environment:
      - TZ=Asia/Shanghai
    # 需要硬件转码时取消注释（Intel 核显示例）：
    # devices:
    #   - /dev/dri:/dev/dri

  # MySQL：可选数据库后端。默认 server 用 SQLite；切到 MySQL 时：
  #   1) 起本服务：docker compose up -d mysql
  #   2) server 环境设 DB_DRIVER=mysql、DB_DSN=root:密码@tcp(mysql:3306)/ivideo?charset=utf8mb4
  # 不切 MySQL 时本服务可以不启动（server 走 SQLite，互不影响）。
  mysql:
    image: mysql:8
    container_name: ivideo-mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=ivideo
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-ivideo_root}
      - TZ=Asia/Shanghai
    ports:
      - "3306:3306"   # 暴露到宿主/局域网,可从 Mac 等直接连(自用内网)
    volumes:
      - ./data/mysql:/var/lib/mysql

  # Go + Gin 后端：聚合 OpenList 与 Jellyfin 两路源，代理视频流。
  server:
    build: ./server
    container_name: ivideo-server
    restart: unless-stopped
    # 配置集中在 ./data/server/conf.yaml（挂到容器内 /data/conf.yaml）。
    # 不再堆一堆环境变量 —— 改配置只改那个文件。参考 server/configs/conf.example.yaml。
    command: ["--config", "/data/conf.yaml"]
    environment:
      - GIN_MODE=release   # Gin 框架自身的环境变量，非 viper 配置
    volumes:
      - ./data/server:/data
      - ./data/media:/media
    depends_on:
      - openlist
      - jellyfin
      - mysql

  # 前端 + nginx 网关：唯一对外入口。
  web:
    build: ./web
    container_name: ivideo-web
    restart: unless-stopped
    ports:
      # 宿主 8080 已被 qBittorrent 占用，改用 8090
      - "8090:80"
    depends_on:
      - server
