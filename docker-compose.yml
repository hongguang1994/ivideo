services:
  # OpenList：挂载各类网盘，提供文件列表与直链。
  # 首次启动后到 http://<服务器IP>:5244 用 admin 登录并配置网盘。
  # 初始管理员密码见容器日志：docker compose logs openlist | grep -i password
  openlist:
    image: openlistteam/openlist:latest
    container_name: ivideo-openlist
    restart: unless-stopped
    # OpenList v4.1.0+ 会校验数据目录可写；数据卷为 root 所有，
    # 故以 root 运行避免权限报错（官方文档推荐做法）。
    user: "0:0"
    ports:
      - "5244:5244"
    volumes:
      - ./data/openlist:/opt/openlist/data
      # 与 ivideo-jellyfin 共用同一宿主目录：Strm 驱动 SaveStrmToLocal
      # 写到 /media/strm，Jellyfin 即可扫到（两边都映射 ./data/media）。
      - ./data/media:/media
    environment:
      - TZ=Asia/Shanghai
      - UMASK=022
      # 如需以特定用户运行，取消注释并填入宿主机的 UID:GID
      # - PUID=0
      # - PGID=0

  # Jellyfin：独立媒体服务器，负责刮削元数据、海报、转码。
  # 媒体库指向 ./data/media（strm 生成器把网盘内容转成 .strm 放这里）。
  # 首启后到 http://<服务器IP>:8096 走向导建库，并在后台生成 API Key 填进 .env。
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: ivideo-jellyfin
    restart: unless-stopped
    ports:
      # 宿主 8096 已被现有 Jellyfin 占用，改用 8097
      - "8097:8096"
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ./data/media:/media
    environment:
      - TZ=Asia/Shanghai
    # 需要硬件转码时取消注释（Intel 核显示例）：
    # devices:
    #   - /dev/dri:/dev/dri

  # Go + Gin 后端：聚合 OpenList 与 Jellyfin 两路源，代理视频流。
  server:
    build: ./server
    container_name: ivideo-server
    restart: unless-stopped
    environment:
      - SERVER_PORT=3001
      - OPENLIST_BASE_URL=http://openlist:5244
      - OPENLIST_USERNAME=${OPENLIST_USERNAME:-admin}
      - OPENLIST_PASSWORD=${OPENLIST_PASSWORD:-}
      - OPENLIST_ROOT=${OPENLIST_ROOT:-/}
      # Jellyfin 接入（留空则后端只提供 OpenList 源）
      - JELLYFIN_BASE_URL=${JELLYFIN_BASE_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      # 按需转存缓存
      - DB_PATH=/data/ivideo.db
      - CACHE_BACKEND=${CACHE_BACKEND:-fake}
      - CACHE_DIR=${CACHE_DIR:-/ivideo-cache}
      - CACHE_MAX_BYTES=${CACHE_MAX_BYTES:-214748364800}
      - CACHE_TTL_HOURS=${CACHE_TTL_HOURS:-72}
      - CACHE_CLEAN_INTERVAL_MINUTES=${CACHE_CLEAN_INTERVAL_MINUTES:-10}
      - ALIYUN_REFRESH_TOKEN=${ALIYUN_REFRESH_TOKEN:-}
      - ALIYUN_TEMP_FOLDER_ID=${ALIYUN_TEMP_FOLDER_ID:-root}
      # 本地 TV token 连接器(oplist 续期挂掉时回退);留空则不启用
      - ALIYUN_OPEN_CONNECTOR_URL=${ALIYUN_OPEN_CONNECTOR_URL:-}
      # strm 媒体库(与 jellyfin 共享同一目录)
      - MEDIA_DIR=/media
      - SITE_URL=${SITE_URL:-http://localhost:8090}
      # strm 指向:hls(转码,流畅) / original(原画,需不限速账号如 TV token)
      - STRM_MODE=${STRM_MODE:-hls}
      - GIN_MODE=release
    volumes:
      - ./data/server:/data
      - ./data/media:/media
    depends_on:
      - openlist
      - jellyfin

  # 前端 + nginx 网关：唯一对外入口。
  web:
    build: ./web
    container_name: ivideo-web
    restart: unless-stopped
    ports:
      # 宿主 8080 已被 qBittorrent 占用，改用 8090
      - "8090:80"
    depends_on:
      - server
